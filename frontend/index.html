<!DOCTYPE html>
<html>
<head>
    <title>AI Voice Analysis</title>

    <style>
        body {
            font-family: Arial;
            padding: 40px;
            background: #0f172a;
            color: #f8fafc;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .container {
            max-width: 900px;
            margin: auto;
        }

        .upload-box {
            border: 2px dashed #334155;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            margin-bottom: 15px;
        }

        button {
            padding: 12px 20px;
            background: #22c55e;
            color: black;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .results {
            margin-top: 30px;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            margin-top: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .loading {
            text-align: center;
            font-size: 18px;
            margin-top: 20px;
        }

        ul {
            padding-left: 20px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🎤 AI Meeting Voice Analyzer</h1>

    <div class="upload-box">
        <input type="file" id="fileInput" />
        <br>
        <button onclick="upload()">Analyze</button>
    </div>

    <div id="result" style="display:none;"></div>

</div>

<script>
async function upload() {
    const file = document.getElementById("fileInput").files[0];

    if (!file) {
        alert("Please upload a video");
        return;
    }

    const formData = new FormData();
    formData.append("file", file);

    document.getElementById("result").style.display = "block";
    document.getElementById("result").innerHTML =
        `<div class="loading">⏳ Analyzing your meeting...</div>`;

    try {
        const response = await fetch("https://bobbie-expostulatory-donald.ngrok-free.dev/analyze", {
            method: "POST",
            body: formData
        });

        const data = await response.json();
        displayResult(data);

    } catch (error) {
        document.getElementById("result").innerHTML =
            `<div class="card">❌ Error: Make sure backend + ngrok are running</div>`;
    }
}

function displayResult(data) {
    let html = `
        <div class="results">

            <h2>Results</h2>

            <div class="results-grid">

                <div class="card">
                    <h3>Volume</h3>
                    <p>${data.volume}</p>
                </div>

                <div class="card">
                    <h3>Pace</h3>
                    <p>${data.pace} (${data.wpm} WPM)</p>
                </div>

                <div class="card">
                    <h3>Tone</h3>
                    <p>${data.tone}</p>
                </div>

                <div class="card">
                    <h3>Score</h3>
                    <p style="color:${data.confidence_score > 80 ? 'lime' : 'orange'}">
                        ${data.confidence_score}
                    </p>
                </div>

            </div>

            <div class="card">
                <h3>Profile</h3>
                <p>${data.profile}</p>
            </div>

            <div class="card">
                <h3>Feedback</h3>
                <ul>
                    ${data.feedback.map(f => `<li>${f}</li>`).join("")}
                </ul>
            </div>

            <div class="card">
                <h3>Keywords</h3>
                <ul>
                    ${data.keywords.map(k => `<li>${k.word} (${k.count})</li>`).join("")}
                </ul>
            </div>

        </div>
    `;

    document.getElementById("result").innerHTML = html;
}
</script>

</body>
</html>
