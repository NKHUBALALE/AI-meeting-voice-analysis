<!DOCTYPE html>
<html>
<head>
    <title>AI Voice Analysis</title>

    <style>
    body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    margin: 0;
    background: linear-gradient(135deg, #020617, #0f172a);
    color: #e2e8f0;
    }

    .container {
    max-width: 900px;
    margin: auto;
    padding: 60px 20px;
    }

    h1 {
    text-align: center;
    font-size: 32px;
    margin-bottom: 40px;
    letter-spacing: -0.5px;
    }

    .upload-box {
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(10px);
    padding: 40px;
    border-radius: 16px;
    text-align: center;
    margin-bottom: 30px;
    transition: 0.3s;
    }

    .upload-box:hover {
    border-color: rgba(34,197,94,0.4);
    }

    input {
    margin-bottom: 20px;
    }

    button {
    padding: 12px 24px;
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: black;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    font-size: 15px;
    transition: 0.2s;
    }

    button:hover {
    transform: scale(1.05);
    }

    .results {
    margin-top: 30px;
    }

    .results-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    }

    .card {
    background: rgba(30, 41, 59, 0.6);
    backdrop-filter: blur(12px);
    padding: 20px;
    border-radius: 14px;
    margin-top: 10px;
    border: 1px solid rgba(255,255,255,0.08);
    transition: 0.2s;
    }

    .card:hover {
    transform: translateY(-3px);
    }

    .card h3 {
    margin-bottom: 10px;
    font-size: 16px;
    color: #94a3b8;
    }

    .loading {
    text-align: center;
    font-size: 18px;
    margin-top: 20px;
    opacity: 0.8;
    }

    ul {
    padding-left: 20px;
    }
    </style>
</head>

<body>

<div class="container">

    <h1>🎤 AI Meeting Voice Analyzer</h1>

    <div class="upload-box">
        <input type="file" id="fileInput" />
        <br>
        <button onclick="upload()">Analyze</button>
    </div>

    <div id="result" style="display:none;"></div>

</div>

<script>
async function upload() {
    const file = document.getElementById("fileInput").files[0];

    if (!file) {
        alert("Please upload a video");
        return;
    }

    const formData = new FormData();
    formData.append("file", file);

    document.getElementById("result").style.display = "block";
    document.getElementById("result").innerHTML =
        `<div class="loading">⏳ Analyzing your meeting...</div>`;

    try {
        const response = await fetch("https://bobbie-expostulatory-donald.ngrok-free.dev/analyze", {
            method: "POST",
            body: formData
        });

        const data = await response.json();
        displayResult(data);

    } catch (error) {
        document.getElementById("result").innerHTML =
            `<div class="card">❌ Error: Make sure backend + ngrok are running</div>`;
    }
}

function displayResult(data) {
    let html = `
        <div class="results">

            <h2>Results</h2>

            <div class="results-grid">

                <div class="card">
                    <h3>Volume</h3>
                    <p>${data.volume}</p>
                </div>

                <div class="card">
                    <h3>Pace</h3>
                    <p>${data.pace} (${data.wpm} WPM)</p>
                </div>

                <div class="card">
                    <h3>Tone</h3>
                    <p>${data.tone}</p>
                </div>

                <div class="card">
                    <h3>Score</h3>
                    <p style="color:${data.confidence_score > 80 ? 'lime' : 'orange'}">
                        ${data.confidence_score}
                    </p>
                </div>

            </div>

            <div class="card">
                <h3>Profile</h3>
                <p>${data.profile}</p>
            </div>

            <div class="card">
                <h3>Feedback</h3>
                <ul>
                    ${data.feedback.map(f => `<li>${f}</li>`).join("")}
                </ul>
            </div>

            <div class="card">
                <h3>Keywords</h3>
                <ul>
                    ${data.keywords.map(k => `<li>${k.word} (${k.count})</li>`).join("")}
                </ul>
            </div>

        </div>
    `;

    document.getElementById("result").innerHTML = html;
}
</script>

</body>
</html>
